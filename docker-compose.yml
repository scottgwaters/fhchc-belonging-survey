# Local development environment
# Run: docker compose up -d --build
#
# Then sign in at http://localhost:3000/admin/login
# with ADMIN_SEED_EMAIL / ADMIN_SEED_PASSWORD below.

services:
  db:
    image: postgres:16-alpine
    container_name: fhchc-survey-db
    environment:
      POSTGRES_USER: survey
      POSTGRES_PASSWORD: survey_dev_password
      POSTGRES_DB: fhchc_survey
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U survey -d fhchc_survey"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: fhchc-survey-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://survey:survey_dev_password@db:5432/fhchc_survey?schema=public"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-dev-only-secret-change-me-in-real-deployments}"
      # Pepper secrets for token + EMT-code hashing (PRD §15.3 / §15.3.1).
      # ALWAYS override these in real deployments. Rotation invalidates issued tokens.
      INVITE_TOKEN_PEPPER: "${INVITE_TOKEN_PEPPER:-dev-only-invite-pepper-do-not-use-in-prod-32chars}"
      EMT_CODE_PEPPER: "${EMT_CODE_PEPPER:-dev-only-emt-pepper-do-not-use-in-prod-32chars}"
      # Seed a super_admin so you can log in immediately. Override in your shell.
      ADMIN_SEED_EMAIL: "${ADMIN_SEED_EMAIL:-admin@fhchc.local}"
      ADMIN_SEED_PASSWORD: "${ADMIN_SEED_PASSWORD:-admin1234}"
      # Google OAuth is optional in dev. If unset, only credentials login works.
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      # SendGrid: leave SENDGRID_API_KEY unset in dev — emails get logged to stdout.
      SENDGRID_API_KEY: "${SENDGRID_API_KEY:-}"
      SENDGRID_FROM_EMAIL: "${SENDGRID_FROM_EMAIL:-survey@fhchc.local}"
      SENDGRID_FROM_NAME: "${SENDGRID_FROM_NAME:-FHCHC Survey}"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
